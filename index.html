    function renderLoiDashboard(filteredLois) {
      const kpis = computeLoiKpis(filteredLois);
      const totalKpis = computeLoiKpis(state.lois);
      const isFiltered = loiFilters.country || loiFilters.bank || loiFilters.status || loiFilters.stage || loiFilters.search;

      let html = '<div class="loi-dashboard">';

      // KPI Cards
      html += '<div class="loi-kpi-row">';

      html += `<div class="loi-kpi-card" data-action="loi-filter-reset">
        <div class="kpi-label">Total LoIs</div>
        <div class="kpi-value">${kpis.total}</div>
        ${isFiltered ? `<div class="kpi-sub">of ${totalKpis.total} total</div>` : ''}
      </div>`;

      html += `<div class="loi-kpi-card">
        <div class="kpi-label">Total Amount</div>
        <div class="kpi-value">&euro;${kpis.totalAmount.toFixed(0)}M</div>
        ${isFiltered ? `<div class="kpi-sub">of &euro;${totalKpis.totalAmount.toFixed(0)}M total</div>` : ''}
      </div>`;

      // Status breakdown
      const statusParts = LOI_STATUS_OPTIONS.map(s => {
        const cls = 'loi-status-' + s.toLowerCase();
        return `<span class="${cls}" style="cursor:pointer;" data-action="loi-filter-status" data-value="${escapeHtml(s)}">${escapeHtml(s)}: ${kpis.byStatus[s]}</span>`;
      }).join(' ');
      html += `<div class="loi-kpi-card">
        <div class="kpi-label">By Status</div>
        <div style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-top:0.3rem;">${statusParts}</div>
      </div>`;

      // Country breakdown
      const countryParts = COUNTRY_CONFIG.map(c => {
        return `<span style="cursor:pointer;font-size:0.82rem;" data-action="loi-filter-country" data-value="${c.id}">
          <img src="${FLAG_URL(c.code)}" alt="" style="width:18px;height:13px;border-radius:2px;vertical-align:middle;"> ${kpis.byCountry[c.id] || 0}
        </span>`;
      }).join('&nbsp;&nbsp;');
      html += `<div class="loi-kpi-card">
        <div class="kpi-label">By Country</div>
        <div style="margin-top:0.4rem;">${countryParts}</div>
      </div>`;

      html += `<div class="loi-kpi-card">
        <div class="kpi-label">Unique Banks</div>
        <div class="kpi-value">${kpis.uniqueBanks}</div>
        ${isFiltered ? `<div class="kpi-sub">of ${totalKpis.uniqueBanks} total</div>` : ''}
      </div>`;

      html += '</div>'; // end kpi-row

      // Filter bar
      html += renderLoiFilterBar();

      // Filter chips
      html += renderLoiFilterChips();

      // Bar charts
      html += '<div class="loi-charts-row">';
      html += renderLoiBarChart('By Bank', kpis.byBank, 'loi-filter-bank', loiFilters.bank, null, null);
      html += renderLoiBarChart('By Country', kpis.byCountry, 'loi-filter-country', loiFilters.country,
        (key) => { const c = COUNTRY_CONFIG.find(cc => cc.id === key); return c ? c.name : key; },
        (key) => 'bar-' + key
      );
      html += renderLoiBarChart('By Status', kpis.byStatus, 'loi-filter-status', loiFilters.status,
        null, (key) => 'bar-' + key.toLowerCase()
      );
      html += '</div>'; // end charts-row

      html += '</div>'; // end dashboard
      return html;

    function setupLoiFilterListeners() {
      const container = document.getElementById('section-lois');
      if (!container) return;

      const countrySelect = container.querySelector('[data-action="loi-select-country"]');
      const bankSelect = container.querySelector('[data-action="loi-select-bank"]');
      const statusSelect = container.querySelector('[data-action="loi-select-status"]');
      const stageSelect = container.querySelector('[data-action="loi-select-stage"]');
      const searchInput = container.querySelector('[data-action="loi-search-input"]');

      if (countrySelect) countrySelect.addEventListener('change', () => {
        loiFilters.country = countrySelect.value || null; renderLoiTab();
      });
      if (bankSelect) bankSelect.addEventListener('change', () => {
        loiFilters.bank = bankSelect.value || null; renderLoiTab();
      });
      if (statusSelect) statusSelect.addEventListener('change', () => {
        loiFilters.status = statusSelect.value || null; renderLoiTab();
      });
      if (stageSelect) stageSelect.addEventListener('change', () => {
        loiFilters.stage = stageSelect.value || null; renderLoiTab();
      });
      if (searchInput) {
        let searchTimeout;
        searchInput.addEventListener('input', () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            loiFilters.search = searchInput.value.trim();
            const cursorPos = searchInput.selectionStart;
            renderLoiTab();
            const newInput = document.querySelector('[data-action="loi-search-input"]');
            if (newInput) { newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
          }, 300);
        });
      }
    }

    function renderLoiProjectGroup(project, isArchived, visibleLoiIds, projectVisible) {
      const projectLois = state.lois.filter(l => l.projectId === project.id);
      const archiveAction = isArchived ? 'unarchive-project' : 'archive-project';
      const archiveLabel = isArchived ? 'Unarchive' : 'Archive';

      const hiddenClass = projectVisible === false ? ' loi-filtered-out' : '';
      let html = `<div class="loi-project-group ${isArchived ? 'archived' : ''}${hiddenClass}">`;

      // Header — show visible count when filtering
      const visibleCount = visibleLoiIds ? projectLois.filter(l => visibleLoiIds.has(l.id)).length : projectLois.length;

      html += `<div class="loi-group-header">`;
      html += `<div class="loi-group-header-left">`;
      html += `<img class="loi-flag" src="${FLAG_URL(project.countryCode)}" alt="${escapeHtml(project.countryName)}">`;
      html += `<span class="loi-project-name">${escapeHtml(project.name)}</span>`;
      html += `<span class="loi-project-meta">&euro;${(project.sizeMillion || 0).toFixed(0)}M</span>`;
      html += `<span class="status ${stageClass(project.stage)}" style="font-size:0.72rem;">${escapeHtml(stageLabel(project.stage))}</span>`;
      html += `</div>`;
      html += `<div class="loi-group-header-actions">`;
      html += `<span style="font-size:0.75rem;color:var(--text-muted);">${visibleCount} LoI${visibleCount !== 1 ? 's' : ''}</span>`;
      html += `<button type="button" class="btn btn-ghost btn-small" data-action="${archiveAction}" data-country="${project.countryId}" data-project="${project.id}">${archiveLabel}</button>`;
      html += `</div></div>`;

      // LoI table
      html += `<div class="loi-table-wrap"><table class="loi-table">`;
      html += '<thead><tr>';
      LOI_COLUMNS.forEach(col => {
        const cls = col === 'notes' ? ' class="loi-col-notes"' : (col === 'bank' ? ' class="loi-col-bank"' : '');
        html += `<th${cls}>${LOI_COLUMN_LABELS[col]}</th>`;
      });
      html += '<th style="width:36px;"></th></tr></thead><tbody>';

      // Existing LoI rows
      projectLois.forEach(loi => {
        const rowHidden = visibleLoiIds && !visibleLoiIds.has(loi.id) ? ' loi-row-filtered-out' : '';
        html += `<tr class="${rowHidden}">`;
        LOI_COLUMNS.forEach(col => {
          const val = loi[col] || '';
          html += `<td class="loi-editable" data-action="loi-edit-cell" data-loi="${loi.id}" data-field="${col}">`;
          if (col === 'status' && val) { html += loiStatusBadge(val); }
          else { html += val ? escapeHtml(val) : '<span style="color:var(--text-muted)">\u2014</span>'; }
          html += '</td>';
        });
        html += `<td class="loi-actions"><button type="button" class="btn btn-ghost btn-small btn-danger" data-action="delete-loi" data-loi="${loi.id}" title="Remove LoI">&times;</button></td>`;
        html += '</tr>';
      });

      // Add-new row
      html += `<tr class="loi-add-row" data-project-for-loi="${project.id}">`;
      LOI_COLUMNS.forEach(col => {
        html += `<td><input type="text" class="loi-new-input" data-field="${col}" placeholder="${LOI_COLUMN_LABELS[col]}"></td>`;
      });
      html += `<td class="loi-actions"><button type="button" class="btn btn-primary btn-small" data-action="add-loi" data-project="${project.id}" data-country="${project.countryId}">+</button></td>`;
      html += '</tr>';

      html += '</tbody></table></div></div>';
      return html;
    }

    function renderLoiTab() {
      const allProjects = getAllProjects();
      const stageOrder = {};
      STAGES.forEach((s, i) => stageOrder[s.id] = i);
      const sortedProjects = [...allProjects].sort((a, b) => {
        const sa = stageOrder[a.stage] ?? 99;
        const sb = stageOrder[b.stage] ?? 99;
        if (sa !== sb) return sa - sb;
        return (b.sizeMillion || 0) - (a.sizeMillion || 0);
      });

      const activeProjects = sortedProjects.filter(p => !p.archived);
      const archivedProjects = sortedProjects.filter(p => p.archived);

      // Compute filtered LoIs for dashboard + visibility
      const filteredLois = getFilteredLois();
      const filteredLoiIds = new Set(filteredLois.map(l => l.id));
      const filteredProjectIds = new Set(filteredLois.map(l => l.projectId));
      const isFiltered = loiFilters.country || loiFilters.bank || loiFilters.status || loiFilters.stage || loiFilters.search;

      let html = '<div class="loi-container">';

      // Dashboard (KPI cards + filter bar + charts)
      html += renderLoiDashboard(filteredLois);

      html += '<h3 class="ref-section-title">Letters of Intent &mdash; Active Projects</h3>';

      if (activeProjects.length === 0) {
        html += '<div class="loi-empty-msg">No active projects.</div>';
      }
      activeProjects.forEach(p => {
        const projectHasMatch = !isFiltered || filteredProjectIds.has(p.id);
        html += renderLoiProjectGroup(p, false, isFiltered ? filteredLoiIds : null, projectHasMatch);
      });

      // Archive section
      html += `<div class="loi-archive-divider" id="loiArchiveToggle">&#128451; Archived Projects (${archivedProjects.length})</div>`;
      html += '<div id="loiArchiveSection">';
      if (archivedProjects.length === 0) {
        html += '<div class="loi-empty-msg">No archived projects.</div>';
      }
      archivedProjects.forEach(p => {
        const projectHasMatch = !isFiltered || filteredProjectIds.has(p.id);
        html += renderLoiProjectGroup(p, true, isFiltered ? filteredLoiIds : null, projectHasMatch);
      });
      html += '</div>';

      html += '</div>';
      document.getElementById('section-lois').innerHTML = html;

      // Wire up filter bar event listeners
      setupLoiFilterListeners();
    }

    // ── Get table data ref from tableId ──
    function getTableDataRef(tableId) {
      if (tableId === 'ecas') return state.ecas;
      if (tableId === 'banks_epcf') return state.banksEpcf;
      if (tableId === 'banks_packager') return state.banksPackager;
      return null;
    }
    function getTableFirebaseCollection(tableId) { return tableId; }

    // ── Drag & drop for columns ──
    let refDragColSrc = null; // { tableId, colIndex }
    let refDragRowSrc = null; // { tableId, rowIndex }

    function setupRefDrag() {
      // Column drag (th headers)
      document.querySelectorAll('.ref-table th[draggable="true"]').forEach(th => {
        th.addEventListener('dragstart', (e) => {
          const tableId = th.getAttribute('data-table');
          const colIndex = parseInt(th.getAttribute('data-col'), 10);
          refDragColSrc = { tableId, colIndex };
          th.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', 'col');
        });
        th.addEventListener('dragend', () => {
          th.classList.remove('dragging');
          document.querySelectorAll('.ref-table th.drag-over').forEach(el => el.classList.remove('drag-over'));
          refDragColSrc = null;
        });
        th.addEventListener('dragover', (e) => {
          if (!refDragColSrc) return;
          if (refDragColSrc.tableId !== th.getAttribute('data-table')) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          document.querySelectorAll('.ref-table th.drag-over').forEach(el => el.classList.remove('drag-over'));
          th.classList.add('drag-over');
        });
        th.addEventListener('dragleave', () => { th.classList.remove('drag-over'); });
        th.addEventListener('drop', async (e) => {
          e.preventDefault();
          th.classList.remove('drag-over');
          if (!refDragColSrc) return;
          const tableId = th.getAttribute('data-table');
          if (refDragColSrc.tableId !== tableId) return;
          const fromIdx = refDragColSrc.colIndex;
          const toIdx = parseInt(th.getAttribute('data-col'), 10);
          if (fromIdx === toIdx) return;
          const tableData = getTableDataRef(tableId);
          if (!tableData) return;
          // Reorder columns array
          const [moved] = tableData.columns.splice(fromIdx, 1);
          tableData.columns.splice(toIdx, 0, moved);
          isSaving = true;
          try {
            await saveRefTableToFirebase(tableId, tableData);
            showToast('Column reordered');
          } catch(err) { showToast('Reorder failed: ' + err.message, 'error'); }
          finally { isSaving = false; _saveCooldownUntil = Date.now() + 3000; }
          refDragColSrc = null;
          if (activeEditCell) cancelCellEdit();
          renderSectionContent();
        });
      });

      // Row drag (td.row-header)
      document.querySelectorAll('.ref-table td.row-header[draggable="true"]').forEach(td => {
        const tr = td.closest('tr');
        td.addEventListener('dragstart', (e) => {
          const tableId = td.getAttribute('data-table');
          const rowIndex = parseInt(td.getAttribute('data-row'), 10);
          refDragRowSrc = { tableId, rowIndex };
          tr.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', 'row');
        });
        td.addEventListener('dragend', () => {
          tr.classList.remove('dragging');
          document.querySelectorAll('.ref-table tr.drag-over-row').forEach(el => el.classList.remove('drag-over-row'));
          refDragRowSrc = null;
        });
        td.addEventListener('dragover', (e) => {
          if (!refDragRowSrc) return;
          if (refDragRowSrc.tableId !== td.getAttribute('data-table')) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          document.querySelectorAll('.ref-table tr.drag-over-row').forEach(el => el.classList.remove('drag-over-row'));
          td.closest('tr').classList.add('drag-over-row');
        });
        td.addEventListener('dragleave', () => { td.closest('tr').classList.remove('drag-over-row'); });
        td.addEventListener('drop', async (e) => {
          e.preventDefault();
          td.closest('tr').classList.remove('drag-over-row');
          if (!refDragRowSrc) return;
          const tableId = td.getAttribute('data-table');
          if (refDragRowSrc.tableId !== tableId) return;
          const fromIdx = refDragRowSrc.rowIndex;
          const toIdx = parseInt(td.getAttribute('data-row'), 10);
          if (fromIdx === toIdx) return;
          const tableData = getTableDataRef(tableId);
          if (!tableData) return;
          // Reorder rows array
          const [moved] = tableData.rows.splice(fromIdx, 1);
          tableData.rows.splice(toIdx, 0, moved);
          isSaving = true;
          try {
            await saveRefTableToFirebase(tableId, tableData);
            showToast('Row reordered');
          } catch(err) { showToast('Reorder failed: ' + err.message, 'error'); }
          finally { isSaving = false; _saveCooldownUntil = Date.now() + 3000; }
          refDragRowSrc = null;
          if (activeEditCell) cancelCellEdit();
          renderSectionContent();
        });
      });
    }

    // ── Inline cell editing ──
    let activeEditCell = null;
    let _selectClickAway = null;

    // ── LoI cell editing ──
    let activeLoiEditCell = null;

    function startCellEdit(td) {
      if (activeEditCell) commitCellEdit(activeEditCell);
      if (_selectClickAway) {
        document.removeEventListener('click', _selectClickAway, true);
        _selectClickAway = null;
      }

      const tableId = td.getAttribute('data-table');
      const key = td.getAttribute('data-key');
      const tableData = getTableDataRef(tableId);
      if (!tableData) return;

      const val = tableData.cells[key] || '';
      const rowName = key.split('|')[0];
      const dropdown = getDropdownOptions(rowName);

      activeEditCell = { td, tableId, key };

      if (dropdown) {
        let selectHtml = '<select autofocus>';
        selectHtml += '<option value="">—</option>';
        dropdown.forEach(opt => {
          selectHtml += `<option value="${escapeHtml(opt)}" ${opt === val ? 'selected' : ''}>${escapeHtml(opt)}</option>`;
        });
        selectHtml += '</select>';
        td.innerHTML = selectHtml;
        const sel = td.querySelector('select');
        sel.focus();
        sel.addEventListener('change', () => commitCellEdit(activeEditCell));
        // Click-away handler (replaces blur which fires too eagerly on selects in Chrome)
        const onDocClick = (ev) => {
          if (!td.contains(ev.target)) {
            document.removeEventListener('click', onDocClick, true);
            _selectClickAway = null;
            if (activeEditCell) commitCellEdit(activeEditCell);
          }
        };
        _selectClickAway = onDocClick;
        setTimeout(() => document.addEventListener('click', onDocClick, true), 0);
      } else {
        td.innerHTML = `<input type="text" value="${escapeHtml(val)}" autofocus>`;
        const inp = td.querySelector('input');
        inp.focus();
        inp.select();
        inp.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); commitCellEdit(activeEditCell); }
          if (ev.key === 'Escape') { ev.preventDefault(); cancelCellEdit(); }
        });
        inp.addEventListener('blur', () => setTimeout(() => { if (activeEditCell) commitCellEdit(activeEditCell); }, 150));
      }
    }

    async function commitCellEdit(editInfo) {
      if (!editInfo) return;
      const { td, tableId, key } = editInfo;
      activeEditCell = null;

      const inp = td.querySelector('input') || td.querySelector('select');
      const newVal = inp ? inp.value.trim() : '';

      const tableData = getTableDataRef(tableId);
      if (!tableData) return;

      tableData.cells[key] = newVal;

      // Re-render cell display
      const rowName = key.split('|')[0];
      if (isStatusRow(rowName)) {
        td.innerHTML = statusBadgeHtml(newVal) || '<span style="color:var(--text-muted)">—</span>';
      } else {
        td.innerHTML = newVal ? escapeHtml(newVal) : '<span style="color:var(--text-muted)">—</span>';
      }

      // Save to Firebase
      isSaving = true;
      try {
        await saveRefTableToFirebase(tableId, tableData);
        showToast('Saved');
      } catch (err) {
        showToast('Save failed: ' + err.message, 'error');
      } finally {
        isSaving = false;
        _saveCooldownUntil = Date.now() + 3000;
      }
    }

    function cancelCellEdit() {
      if (!activeEditCell) return;
      if (_selectClickAway) {
        document.removeEventListener('click', _selectClickAway, true);
        _selectClickAway = null;
      }
      const { td, tableId, key } = activeEditCell;
      activeEditCell = null;
      const tableData = getTableDataRef(tableId);
      const val = tableData ? (tableData.cells[key] || '') : '';
      const rowName = key.split('|')[0];
      if (isStatusRow(rowName)) {
        td.innerHTML = statusBadgeHtml(val) || '<span style="color:var(--text-muted)">—</span>';
      } else {
        td.innerHTML = val ? escapeHtml(val) : '<span style="color:var(--text-muted)">—</span>';
      }
    }

    // ── LoI inline cell editing ──
    let _loiClickAway = null;

    function startLoiCellEdit(td) {
      if (activeLoiEditCell) commitLoiCellEdit(activeLoiEditCell);
      if (_loiClickAway) { document.removeEventListener('click', _loiClickAway, true); _loiClickAway = null; }

      const loiId = td.getAttribute('data-loi');
      const field = td.getAttribute('data-field');
      const loi = state.lois.find(l => l.id === loiId);
      if (!loi) return;
      const val = loi[field] || '';
      activeLoiEditCell = { td, loiId, field };

      if (field === 'status') {
        let selectHtml = '<select autofocus><option value="">\u2014</option>';
        LOI_STATUS_OPTIONS.forEach(opt => { selectHtml += `<option value="${escapeHtml(opt)}" ${opt === val ? 'selected' : ''}>${escapeHtml(opt)}</option>`; });
        selectHtml += '</select>';
        td.innerHTML = selectHtml;
        const sel = td.querySelector('select');
        sel.focus();
        sel.addEventListener('change', () => commitLoiCellEdit(activeLoiEditCell));
        const onDocClick = (ev) => {
          if (!td.contains(ev.target)) { document.removeEventListener('click', onDocClick, true); _loiClickAway = null; if (activeLoiEditCell) commitLoiCellEdit(activeLoiEditCell); }
        };
        _loiClickAway = onDocClick;
        setTimeout(() => document.addEventListener('click', onDocClick, true), 0);
      } else {
        const inputType = field === 'date' ? 'date' : 'text';
        td.innerHTML = `<input type="${inputType}" value="${escapeHtml(val)}" autofocus>`;
        const inp = td.querySelector('input');
        inp.focus();
        if (inputType === 'text') inp.select();
        inp.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); commitLoiCellEdit(activeLoiEditCell); }
          if (ev.key === 'Escape') { ev.preventDefault(); cancelLoiCellEdit(); }
        });
        inp.addEventListener('blur', () => setTimeout(() => { if (activeLoiEditCell) commitLoiCellEdit(activeLoiEditCell); }, 150));
      }
    }

    async function commitLoiCellEdit(editInfo) {
      if (!editInfo) return;
      const { td, loiId, field } = editInfo;
      activeLoiEditCell = null;
      if (_loiClickAway) { document.removeEventListener('click', _loiClickAway, true); _loiClickAway = null; }

      const inp = td.querySelector('input') || td.querySelector('select');
      const newVal = inp ? inp.value.trim() : '';
      const loi = state.lois.find(l => l.id === loiId);
      if (!loi) return;
      loi[field] = newVal;

      if (field === 'status') {
        td.innerHTML = newVal ? loiStatusBadge(newVal) : '<span style="color:var(--text-muted)">\u2014</span>';
      } else {
        td.innerHTML = newVal ? escapeHtml(newVal) : '<span style="color:var(--text-muted)">\u2014</span>';
      }

      isSaving = true;
      try { await saveLoiToFirebase(loi); showToast('Saved'); }
      catch (err) { showToast('Save failed: ' + err.message, 'error'); }
      finally { isSaving = false; _saveCooldownUntil = Date.now() + 3000; }
    }

    function cancelLoiCellEdit() {
      if (!activeLoiEditCell) return;
      if (_loiClickAway) { document.removeEventListener('click', _loiClickAway, true); _loiClickAway = null; }
      const { td, loiId, field } = activeLoiEditCell;
      activeLoiEditCell = null;
      const loi = state.lois.find(l => l.id === loiId);
      const val = loi ? (loi[field] || '') : '';
      if (field === 'status') {
        td.innerHTML = val ? loiStatusBadge(val) : '<span style="color:var(--text-muted)">\u2014</span>';
      } else {
        td.innerHTML = val ? escapeHtml(val) : '<span style="color:var(--text-muted)">\u2014</span>';
      }
    }

    // ── Add columns and rows (inline) ──
    async function refAddColumn(tableId, name) {
      if (!name || !name.trim()) return;
      const tableData = getTableDataRef(tableId);
      if (!tableData) return;
      tableData.columns.push(name.trim());
      isSaving = true;
      try {
        await saveRefTableToFirebase(tableId, tableData);
        showToast('Column added');
      } catch(e) { showToast('Failed: ' + e.message, 'error'); }
      finally { isSaving = false; _saveCooldownUntil = Date.now() + 3000; }
      if (activeEditCell) cancelCellEdit();
      renderSectionContent();
    }

    async function refAddRow(tableId, name) {
      if (!name || !name.trim()) return;
      const tableData = getTableDataRef(tableId);
      if (!tableData) return;
      tableData.rows.push(name.trim());
      isSaving = true;
      try {
        await saveRefTableToFirebase(tableId, tableData);
        showToast('Row added');
      } catch(e) { showToast('Failed: ' + e.message, 'error'); }
      finally { isSaving = false; _saveCooldownUntil = Date.now() + 3000; }
      if (activeEditCell) cancelCellEdit();
      renderSectionContent();
    }

    // ── Wire inline add inputs ──
    function setupRefInlineAdd() {
      // New column inputs
      document.querySelectorAll('.ref-new-col').forEach(input => {
        const fresh = input.cloneNode(true);
        input.parentNode.replaceChild(fresh, input);
        const handler = async () => {
          const val = fresh.value.trim();
          if (!val) return;
          const tableId = fresh.getAttribute('data-table');
          fresh.value = '';
          await refAddColumn(tableId, val);
        };
        fresh.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handler(); } });
        fresh.addEventListener('blur', handler);
      });
      // New row inputs
      document.querySelectorAll('.ref-new-row').forEach(input => {
        const fresh = input.cloneNode(true);
        input.parentNode.replaceChild(fresh, input);
        const handler = async () => {
          const val = fresh.value.trim();
          if (!val) return;
          const tableId = fresh.getAttribute('data-table');
          fresh.value = '';
          await refAddRow(tableId, val);
        };
        fresh.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handler(); } });
        fresh.addEventListener('blur', handler);
      });
    }

    // ── Sub-tab switching ──
    function switchSection(sectionId) {
      document.querySelectorAll('#sectionTabs .section-tab').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-section') === sectionId);

      document.querySelectorAll('.map-section > .section-content').forEach(div => {
        div.classList.toggle('active', div.id === 'section-' + sectionId);

      if (sectionId === 'banks') renderBanksTab();

    // ── Activity Feed ──
    async function renderActivityTab() {
      const feed = document.getElementById('activityFeed');
      if (!feed) return;
      feed.innerHTML = '<div style="color:var(--text-muted);padding:1rem;">Loading activity...</div>';

      const entries = await loadChangelog(50);
      if (entries.length === 0) {
        feed.innerHTML = '<div style="color:var(--text-muted);padding:1rem;">No activity recorded yet. Changes will appear here as you and your team work.</div>';
        return;
      }

      const actionVerbs = {
        created: 'created', updated: 'updated', deleted: 'deleted',
        archived: 'archived', unarchived: 'unarchived',
        completed: 'completed', reopened: 'reopened'
      };
      const entityIcons = { project: '\ud83d\udcc1', task: '\u2611', loi: '\ud83d\udcdd', eca: '\ud83c\udfe6', bank: '\ud83c\udfe6' };

      let html = '<h3 style="margin-bottom:0.75rem;">Recent Activity</h3>';
      entries.forEach(e => {
        const verb = actionVerbs[e.action] || e.action;
        const icon = entityIcons[e.entityType] || '';
        const ago = timeAgo(e.timestamp);
        html += `<div class="activity-item">`;
        html += `<div class="activity-avatar">${escapeHtml(e.userInitials || '??')}</div>`;
        html += `<div class="activity-body">`;
        html += `<div class="activity-text"><strong>${escapeHtml(e.user)}</strong> ${verb} ${e.entityType} ${icon} <strong>${escapeHtml(e.entityName)}</strong></div>`;
        if (e.details) html += `<div class="activity-detail">${escapeHtml(e.details)}</div>`;
        html += `<div class="activity-meta">${ago}</div>`;
        html += `</div></div>`;
      });
      feed.innerHTML = html;
    }

    function timeAgo(isoString) {
      if (!isoString) return '';
      const diff = Date.now() - new Date(isoString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 30) return days + 'd ago';
      return new Date(isoString).toLocaleDateString();
    }

    // ── Project Detail Modal ──
    function openProjectModal(countryId, projectId) {
      const projects = state.projects[countryId] || [];
      const project = projects.find(p => p.id === projectId);
      if (!project) return;

      const country = COUNTRY_CONFIG.find(c => c.id === countryId);
      const todos = (state.todos[countryId] || []).filter(t => t.projectId === projectId);
      const lois = state.lois.filter(l => l.projectId === projectId);
      const openTasks = todos.filter(t => !t.done).length;

      let html = '';

      // Project fields grid
      html += '<div class="modal-detail-grid">';
      html += `<div class="modal-detail-field"><div class="field-label">Country</div><div class="field-value">${country ? escapeHtml(country.name) : countryId}</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Size</div><div class="field-value">&euro;${(project.sizeMillion || 0).toFixed(1)}M</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Stage</div><div class="field-value"><span class="status ${stageClass(project.stage)}">${escapeHtml(stageLabel(project.stage))}</span></div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Client</div><div class="field-value">${escapeHtml(project.client || '\u2014')}</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">ECA</div><div class="field-value">${escapeHtml(project.eca || '\u2014')}</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Coverage</div><div class="field-value">${project.coveragePercent || 0}%</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Tenor</div><div class="field-value">${project.tenor ? project.tenor + ' years' : '\u2014'}</div></div>`;
      html += `<div class="modal-detail-field"><div class="field-label">Construction Period</div><div class="field-value">${escapeHtml(project.constructionPeriod || '\u2014')}</div></div>`;
      html += '</div>';

      // Notes
      if (project.notes) {
        html += '<div class="modal-section-title">Notes</div>';
        html += '<div class="modal-notes">' + escapeHtml(project.notes) + '</div>';
      }

      // Tasks
      html += `<div class="modal-section-title">Tasks (${openTasks} open / ${todos.length} total)</div>`;
      if (todos.length > 0) {
        todos.forEach(t => {
          html += `<div class="modal-task-item ${t.done ? 'done' : ''}">`;
          html += `<span>${t.done ? '\u2611' : '\u2610'}</span>`;
          html += `<span>${escapeHtml(t.text)}</span>`;
          if (t.owner) html += `<span class="modal-task-owner">${escapeHtml(t.owner)}</span>`;
          html += '</div>';
        });
      } else {
        html += '<div style="color:var(--text-muted);font-size:0.85rem;">No tasks linked to this project.</div>';
      }

      // LoIs
      if (lois.length > 0) {
        html += `<div class="modal-section-title">Letters of Intent (${lois.length})</div>`;
        html += '<table class="modal-loi-table"><thead><tr><th>Bank</th><th>Amount</th><th>Tenor</th><th>Margin</th><th>Status</th><th>Date</th></tr></thead><tbody>';
        lois.forEach(l => {
          const statusCls = 'loi-status-' + (l.status || '').toLowerCase();
          html += `<tr>`;
          html += `<td>${escapeHtml(l.bank || '')}</td>`;
          html += `<td>&euro;${escapeHtml(l.amount || '0')}M</td>`;
          html += `<td>${escapeHtml(l.tenor || '')}</td>`;
          html += `<td>${escapeHtml(l.margin || '')}</td>`;
          html += `<td><span class="${statusCls}">${escapeHtml(l.status || '')}</span></td>`;
          html += `<td>${escapeHtml(l.date || '')}</td>`;
          html += `</tr>`;
        });
        html += '</tbody></table>';
      }

      document.getElementById('modalProjectTitle').textContent = project.name;
      document.getElementById('modalProjectBody').innerHTML = html;

      // Actions
      let actionsHtml = '';
      if (!isViewer()) {
        actionsHtml += `<button class="btn btn-primary btn-small" data-action="edit-from-modal" data-country="${countryId}" data-project="${projectId}">Edit Project</button>`;
      }
      actionsHtml += '<button class="btn btn-ghost btn-small" onclick="closeProjectModal()">Close</button>';
      document.getElementById('modalProjectActions').innerHTML = actionsHtml;

      document.getElementById('projectModal').classList.remove('hidden');
    }

    function closeProjectModal() {
      document.getElementById('projectModal').classList.add('hidden');
    }
    window.closeProjectModal = closeProjectModal;

    // Close modal on overlay click or Escape
    document.getElementById('projectModal').addEventListener('click', (e) => {
      if (e.target.id === 'projectModal') closeProjectModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !document.getElementById('projectModal').classList.contains('hidden')) {
        closeProjectModal();
      }
    });

    // ── Global delegated event listener (set up ONCE, works across re-renders) ──
    document.addEventListener('click', async (e) => {
      // Find closest element with data-action
      const el = e.target.closest('[data-action]');
      if (!el) return;

      const action = el.getAttribute('data-action');
      const countryId = el.getAttribute('data-country');
      const projectId = el.getAttribute('data-project');
      const todoId = el.getAttribute('data-todo');

      // Block write actions for viewers
      const WRITE_ACTIONS = ['add-project', 'delete-project', 'add-todo', 'add-todo-for-project',
        'toggle-todo', 'delete-todo', 'save-project-inline', 'save-task-inline',
        'delete-task-inline', 'add-loi', 'delete-loi', 'archive-project', 'unarchive-project',
        'ref-edit-cell', 'loi-edit-cell',
        'ref-rename-col', 'ref-delete-col', 'ref-rename-row', 'ref-delete-row', 'toggle-pin'];
      if (WRITE_ACTIONS.includes(action) && isViewer()) {
        e.stopPropagation();
        showToast('View-only access — you cannot make changes.', 'error');
        return;
      }

      if (action === 'sort-projects') {
        e.stopPropagation();
        const field = el.getAttribute('data-field');
        if (projectSort.field === field) {
          projectSort.direction = projectSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
          projectSort.field = field;
          projectSort.direction = 'asc';
        }
        render();
        return;
      }
      if (action === 'add-project') { e.stopPropagation(); await addProject(countryId); }
      if (action === 'delete-project') { e.stopPropagation(); await deleteProject(countryId, projectId); }
      if (action === 'add-todo') await addTodo(countryId);
      if (action === 'add-todo-for-project') { e.stopPropagation(); await addTodo(countryId, projectId); }
      if (action === 'toggle-todo') { e.stopPropagation(); await toggleTodo(countryId, todoId); }
      if (action === 'delete-todo') await deleteTodo(countryId, todoId);
      if (action === 'toggle-expand') {
        e.stopPropagation();
        // Don't toggle if click came from inside an expanded section
        if (e.target.closest('.project-expanded-inner')) return;
        if (expandedProjects.has(projectId)) expandedProjects.delete(projectId);
        else expandedProjects.add(projectId);
        render();
      }
      if (action === 'toggle-task-edit') {
        e.stopPropagation();
        if (expandedTasks.has(todoId)) expandedTasks.delete(todoId);
        else expandedTasks.add(todoId);
        render();
      }
      if (action === 'save-project-inline') { e.stopPropagation(); await saveProjectInline(countryId, projectId); }
      if (action === 'save-task-inline') { e.stopPropagation(); await saveTaskInline(countryId, todoId); }
      if (action === 'delete-task-inline') { e.stopPropagation(); await deleteTaskInline(countryId, todoId); }
      if (action === 'open-project') {
        e.stopPropagation();
        openProjectModal(countryId, projectId);
      }
      if (action === 'edit-from-modal') {
        e.stopPropagation();
        closeProjectModal();
        expandedProjects.add(projectId);
        switchTab('country-' + countryId);
      }
      if (action === 'toggle-pin') {
        e.stopPropagation();
        const projects = state.projects[countryId] || [];
        const project = projects.find(p => p.id === projectId);
        if (!project) return;
        project.pinned = !project.pinned;
        isSaving = true;
        try {
          await saveProjectToFirebase(countryId, project);
          showToast(project.pinned ? 'Project pinned' : 'Project unpinned');
        } catch(err) {
          showToast('Save failed: ' + err.message, 'error');
        } finally {
          isSaving = false;
          _saveCooldownUntil = Date.now() + 2000;
        }
        render();
      }

      // ── Reference table actions ──
      if (action === 'ref-edit-cell') {
        e.stopPropagation();
        if (el.querySelector('select') || el.querySelector('input')) return;
        startCellEdit(el);
      }
      if (action === 'ref-rename-col') {
        e.stopPropagation();
        const tblId = el.getAttribute('data-table');
        const ci = parseInt(el.getAttribute('data-col'));
        const tableData = getTableDataRef(tblId);
        if (!tableData) return;
        const oldName = tableData.columns[ci];
        const newName = prompt('Rename column:', oldName);
        if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
        const trimmed = newName.trim();
        // Update cell keys
        const newCells = {};
        for (const [key, val] of Object.entries(tableData.cells)) {
          const [rowKey, colKey] = key.split('|');
          newCells[rowKey + '|' + (colKey === oldName ? trimmed : colKey)] = val;
        }
        tableData.cells = newCells;
        tableData.columns[ci] = trimmed;
        saveRefTableToFirebase(getTableFirebaseCollection(tblId), tableData);
        renderSectionContent();
        showToast(`Column renamed to "${trimmed}"`);
      }
      if (action === 'ref-delete-col') {
        e.stopPropagation();
        const tblId = el.getAttribute('data-table');
        const ci = parseInt(el.getAttribute('data-col'));
        const tableData = getTableDataRef(tblId);
        if (!tableData) return;
        const colName = tableData.columns[ci];
        if (!confirm(`Delete column "${colName}"? This cannot be undone.`)) return;
        tableData.columns.splice(ci, 1);
        const newCells = {};
        for (const [key, val] of Object.entries(tableData.cells)) {
          if (!key.endsWith('|' + colName)) newCells[key] = val;
        }
        tableData.cells = newCells;
        saveRefTableToFirebase(getTableFirebaseCollection(tblId), tableData);
        renderSectionContent();
        showToast(`Column "${colName}" deleted`);
      }
      if (action === 'ref-rename-row') {
        e.stopPropagation();
        const tblId = el.getAttribute('data-table');
        const ri = parseInt(el.getAttribute('data-row'));
        const tableData = getTableDataRef(tblId);
        if (!tableData) return;
        const oldName = tableData.rows[ri];
        const newName = prompt('Rename row:', oldName);
        if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
        const trimmed = newName.trim();
        const newCells = {};
        for (const [key, val] of Object.entries(tableData.cells)) {
          const [rowKey, colKey] = key.split('|');
          newCells[(rowKey === oldName ? trimmed : rowKey) + '|' + colKey] = val;
        }
        tableData.cells = newCells;
        tableData.rows[ri] = trimmed;
        saveRefTableToFirebase(getTableFirebaseCollection(tblId), tableData);
        renderSectionContent();
        showToast(`Row renamed to "${trimmed}"`);
      }
      if (action === 'ref-delete-row') {
        e.stopPropagation();
        const tblId = el.getAttribute('data-table');
        const ri = parseInt(el.getAttribute('data-row'));
        const tableData = getTableDataRef(tblId);
        if (!tableData) return;
        const rowName = tableData.rows[ri];
        if (!confirm(`Delete row "${rowName}"? This cannot be undone.`)) return;
        tableData.rows.splice(ri, 1);
        const newCells = {};
        for (const [key, val] of Object.entries(tableData.cells)) {
          if (!key.startsWith(rowName + '|')) newCells[key] = val;
        }
        tableData.cells = newCells;
        saveRefTableToFirebase(getTableFirebaseCollection(tblId), tableData);
        renderSectionContent();
        showToast(`Row "${rowName}" deleted`);
      }

      // ── LoI actions ──
      if (action === 'loi-edit-cell') {
        e.stopPropagation();
        if (el.querySelector('select') || el.querySelector('input')) return;
        startLoiCellEdit(el);
      }

      if (action === 'add-loi') {
        e.stopPropagation();
        const projId = el.getAttribute('data-project');
        const addRow = el.closest('.loi-add-row');
        if (!addRow) return;
        const newLoi = { id: id(), projectId: projId };
        let hasValue = false;
        LOI_COLUMNS.forEach(col => {
          const inp = addRow.querySelector(`input[data-field="${col}"]`);
          newLoi[col] = inp ? inp.value.trim() : '';
          if (newLoi[col]) hasValue = true;
        });
        if (!hasValue) { showToast('Enter at least one field', 'error'); return; }
        state.lois.push(newLoi);
        isSaving = true;
        try { await saveLoiToFirebase(newLoi); logChange('created', 'loi', newLoi.id, newLoi.bank || 'New LoI', 'for project ' + projId); showToast('LoI added'); }
        catch (err) { showToast('Save failed: ' + err.message, 'error'); }
        finally { isSaving = false; _saveCooldownUntil = Date.now() + 2000; }
        renderLoiTab();
      }

      if (action === 'delete-loi') {
        e.stopPropagation();
        const loiId = el.getAttribute('data-loi');
        if (!confirm('Remove this LoI entry?')) return;
        const deletedLoi = state.lois.find(l => l.id === loiId);
        state.lois = state.lois.filter(l => l.id !== loiId);
        isSaving = true;
        try { await deleteLoiFromFirebase(loiId); logChange('deleted', 'loi', loiId, deletedLoi ? deletedLoi.bank : loiId); showToast('LoI removed'); }
        catch (err) { showToast('Delete failed: ' + err.message, 'error'); }
        finally { isSaving = false; _saveCooldownUntil = Date.now() + 2000; }
        renderLoiTab();
      }

      if (action === 'archive-project' || action === 'unarchive-project') {
        e.stopPropagation();
        const countryId = el.getAttribute('data-country');
        const projectId = el.getAttribute('data-project');
        const projects = state.projects[countryId] || [];
        const project = projects.find(p => p.id === projectId);
        if (!project) return;
        project.archived = (action === 'archive-project');
        isSaving = true;
        try {
          await saveProjectToFirebase(countryId, project);
          logChange(project.archived ? 'archived' : 'unarchived', 'project', projectId, project.name);
          showToast(project.archived ? 'Project archived' : 'Project unarchived');
        }
        catch (err) { showToast('Save failed: ' + err.message, 'error'); }
        finally { isSaving = false; _saveCooldownUntil = Date.now() + 2000; }
        renderLoiTab();
        render();
      }

      if (action === 'logoff') {
        e.stopPropagation();
        localStorage.removeItem(STORAGE_KEY);
        state.currentUser = null;
        location.reload();
        return;
      }

      // ── LoI Dashboard interactive filtering ──
      if (action === 'loi-filter-country') {
        e.stopPropagation();
        const val = el.getAttribute('data-value');
        loiFilters.country = (loiFilters.country === val) ? null : val;
        renderLoiTab();
      }
      if (action === 'loi-filter-bank') {
        e.stopPropagation();
        const val = el.getAttribute('data-value');
        loiFilters.bank = (loiFilters.bank === val) ? null : val;
        renderLoiTab();
      }
      if (action === 'loi-filter-status') {
        e.stopPropagation();
        const val = el.getAttribute('data-value');
        loiFilters.status = (loiFilters.status === val) ? null : val;
        renderLoiTab();
      }
      if (action === 'loi-filter-reset') {
        e.stopPropagation();
        loiFilters.country = null;
        loiFilters.bank = null;
        loiFilters.status = null;
        loiFilters.stage = null;
        loiFilters.search = '';
        renderLoiTab();
      }

      // Filter chip removal
      if (action === 'loi-clear-country') { e.stopPropagation(); loiFilters.country = null; renderLoiTab(); }
      if (action === 'loi-clear-bank') { e.stopPropagation(); loiFilters.bank = null; renderLoiTab(); }
      if (action === 'loi-clear-status') { e.stopPropagation(); loiFilters.status = null; renderLoiTab(); }
      if (action === 'loi-clear-stage') { e.stopPropagation(); loiFilters.stage = null; renderLoiTab(); }
      if (action === 'loi-clear-search') { e.stopPropagation(); loiFilters.search = ''; renderLoiTab(); }
    });

    // ── Section tab switching (separate listener for section tabs) ──
    document.addEventListener('click', (e) => {
      const sectionBtn = e.target.closest('.section-tab');
      if (sectionBtn && sectionBtn.closest('#sectionTabs')) {
        e.stopPropagation();
        const sectionId = sectionBtn.getAttribute('data-section');
        switchSection(sectionId);
      }
    });

    window.saveTaskInline = saveTaskInline;
    window.deleteTaskInline = deleteTaskInline;
    window.saveProjectInline = saveProjectInline;
    window.switchTab = switchTab;
    window._state = state;
    window._expandedProjects = expandedProjects;
    window._expandedTasks = expandedTasks;
    window._loiFilters = loiFilters;
    window._render = render;

    // Utility: generate SHA-256 hash for new user passwords
    // Usage: open browser console, run: generatePasswordHash('newpassword')
    window.generatePasswordHash = async (pw) => {
      const h = await sha256(pw);
      console.log('Hash for "' + pw + '":\n' + h);
      console.log('Add to USER_MAP: \'' + h + '\': { name: \'New User\', initials: \'NU\', role: \'editor\' },');
      return h;
    };

    // Initialize
    document.getElementById('gateForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const input = document.getElementById('gatePassword');
      const password = input && input.value ? input.value : '';
      showGateError('');

      if (!password) {
        showGateError('Please enter your password.');
        return;
      }

      const hash = await sha256(password);
      const user = USER_MAP[hash];
      if (!user) {
        showGateError('Incorrect password.');
        return;
      }

      showApp(user);
      try {
        await loadFromFirebase();
      } catch (e) {
        console.warn('Firebase failed on login, using local seed:', e);
        loadLocalSeed();
      }
      try { setupRealtimeListeners(); } catch(e) { console.warn('Realtime listeners failed:', e); }
      render();
    });

    // Check for stored login
    const storedUser = checkStoredLogin();
    if (storedUser) {
      showApp(storedUser);
      loadFromFirebase()
        .catch(e => { console.warn('Firebase failed, using local seed:', e); loadLocalSeed(); })
        .then(() => {
          try { setupRealtimeListeners(); } catch(e) {}
          render();
        });
    } else {
      document.getElementById('gatePassword')?.focus();
    }
  </script>
</body>
</html>
